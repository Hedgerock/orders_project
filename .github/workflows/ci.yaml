name: CI

on:
  pull_request:
    branches: [ master ]

jobs:
  install-yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install yamllist
        run: pip install yamllint
  check-diagrams:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Check PlantUML diagrams
        run: make check-diagrams
  check-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run yamllint
        run: make check-k8s

